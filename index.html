<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>籌碼精確分析報告</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --text-main: #c9d1d9;
            --accent: #58a6ff;
            --border-color: #30363d;
            --up-color: #26a69a;
            --down-color: #ef5350;
            --warn-color: #f1e05a;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 25px;
            background: linear-gradient(180deg, var(--card-bg) 0%, var(--bg-color) 100%);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .header h1 { margin: 0; color: var(--accent); }
        .header p { color: #8b949e; margin-top: 10px; }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .stock-info { display: flex; align-items: center; gap: 15px; flex-wrap: wrap; }
        .stock-title { font-size: 1.6rem; font-weight: bold; color: white; }
        .rating-badge {
            padding: 5px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
            font-weight: 600;
            background: rgba(48, 54, 61, 0.5);
            border: 1px solid var(--border-color);
            white-space: nowrap;
        }
        .insight-badge {
            font-size: 0.95rem;
            color: var(--accent);
            font-weight: 500;
            background: rgba(88, 166, 255, 0.1);
            padding: 5px 12px;
            border-radius: 6px;
            border: 1px solid rgba(88, 166, 255, 0.2);
        }

        .chart-container {
            position: relative;
            height: 350px;
            width: 100%;
        }

        .footer-note {
            margin-top: 15px;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            font-size: 0.85rem;
            color: #8b949e;
        }

        .tag { color: #8b949e; }

        @media (max-width: 700px) {
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 籌碼流向精確觀測站</h1>
            <p>分析週期：2026/02/20 至 2026/03/13 | 每週更新</p>
        </div>
        
        <div class="grid" id="chartGrid"></div>
    </div>

    <script>
        // 註冊 DataLabels 插件
        Chart.register(ChartDataLabels);

        const rawData = [
            { id: "8299 群聯", rating: "🔴 渙散", note: "籌碼持續流失", bigHolder: [59.10, 58.29, 57.96, 57.72, 56.39], shareholders: [87255, 92479, 99852, 103604, 108649] },
            { id: "3260 威剛", rating: "🟡 觀望", note: "止跌回升?", bigHolder: [57.79, 56.28, 53.88, 53.61, 54.90], shareholders: [82053, 84299, 88820, 89758, 92318] },
            { id: "2451 創見", rating: "🟢 安定", note: "籌碼穩定", bigHolder: [79.74, 79.55, 78.64, 78.46, 79.20], shareholders: [30631, 30700, 31763, 31414, 30857] },
            { id: "5289 宜鼎", rating: "🟡 觀望", note: "底部反彈", bigHolder: [45.55, 43.28, 42.29, 41.06, 42.73], shareholders: [32930, 34786, 36563, 38951, 37781] },
            { id: "2408 南亞科", rating: "🔴 轉弱", note: "大戶明顯減持", bigHolder: [85.50, 85.60, 85.23, 85.06, 82.68], shareholders: [214499, 212907, 220465, 222451, 259700] },
            { id: "2337 旺宏", rating: "🟠 弱勢", note: "籌碼波動較大", bigHolder: [51.64, 58.31, 54.64, 54.67, 51.34], shareholders: [352391, 312595, 351817, 361113, 386809] },
            { id: "2317 鴻海", rating: "🟡 整理", note: "籌碼微幅下降", bigHolder: [67.70, 67.99, 68.78, 68.41, 67.98], shareholders: [1151214, 1139898, 1109444, 1128098, 1151439] },
            { id: "2330 台積電", rating: "🟢 穩健", note: "波動極其微小", bigHolder: [89.04, 89.08, 89.06, 88.77, 88.56], shareholders: [1981316, 1982676, 2014899, 2245824, 2389450] }
        ];

        const labels = ["02/06", "02/11", "02/26", "03/06", "03/13"];

        function createChart(canvasId, stock) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            
            // 決定主色調
            let mainColor = '#58a6ff';
            if (stock.rating.includes('🟢')) mainColor = '#26a69a';
            if (stock.rating.includes('🔴') || stock.rating.includes('🟠')) mainColor = '#ef5350';
            if (stock.rating.includes('🟡')) mainColor = '#f1e05a';

            // 計算大戶持股範圍，避免過度縮放
            const bhMin = Math.min(...stock.bigHolder);
            const bhMax = Math.max(...stock.bigHolder);
            const bhRange = bhMax - bhMin;
            // 強制 Y 軸至少有 2.5% 的跨度，避免微小變化看來像垂直墜落
            const bhPadding = Math.max(bhRange * 0.5, 1.25); 

            // 計算股東變幅範圍，為標籤留出空間
            const changes = stock.shareholders.map((v, i) => i === 0 ? 0 : ((v - stock.shareholders[i-1]) / stock.shareholders[i-1]) * 100);
            const chgMin = Math.min(...changes);
            const chgMax = Math.max(...changes);
            const chgRange = chgMax - chgMin;
            const chgPadding = Math.max(chgRange * 0.4, 3.0); // 增加 40% 或至少 3% 的空間

            new Chart(ctx, {
                data: {
                    labels: labels,
                    datasets: [
                        {
                            type: 'line',
                            label: '大戶持股 %',
                            data: stock.bigHolder,
                            borderColor: mainColor,
                            backgroundColor: 'transparent',
                            borderWidth: 4,
                            yAxisID: 'y',
                            tension: 0,
                            pointRadius: 6,
                            pointHoverRadius: 8,
                            pointBackgroundColor: mainColor,
                            datalabels: {
                                align: 'top',
                                offset: 8,
                                color: mainColor,
                                font: { weight: 'bold', size: 12 },
                                formatter: (value) => value.toFixed(2) + '%'
                            }
                        },
                        {
                            type: 'bar',
                            label: '股東人數週變幅 %',
                            data: changes,
                            backgroundColor: (context) => {
                                const val = context.dataset.data[context.dataIndex];
                                return val >= 0 ? 'rgba(88, 166, 255, 0.4)' : 'rgba(239, 83, 80, 0.4)';
                            },
                            borderColor: (context) => {
                                const val = context.dataset.data[context.dataIndex];
                                return val >= 0 ? 'rgba(88, 166, 255, 0.8)' : 'rgba(239, 83, 80, 0.8)';
                            },
                            borderWidth: 1,
                            yAxisID: 'y1',
                            barPercentage: 0.6,
                            datalabels: {
                                anchor: (context) => context.dataset.data[context.dataIndex] >= 0 ? 'end' : 'start',
                                align: (context) => context.dataset.data[context.dataIndex] >= 0 ? 'top' : 'bottom',
                                color: (context) => context.dataset.data[context.dataIndex] >= 0 ? '#58a6ff' : '#ef5350',
                                offset: 4,
                                font: { size: 11, weight: 'bold' },
                                formatter: (v, ctx) => ctx.dataIndex === 0 ? '' : (v > 0 ? '+' : '') + v.toFixed(1) + '%'
                            }
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: { top: 45 } },
                    plugins: {
                        legend: { 
                            position: 'top',
                            labels: { color: '#c9d1d9', boxWidth: 12, usePointStyle: true }
                        },
                        tooltip: {
                            backgroundColor: 'rgba(22, 27, 34, 0.95)',
                            titleColor: '#58a6ff',
                            padding: 12,
                            borderColor: '#30363d',
                            borderWidth: 1,
                            callbacks: {
                                label: function(context) {
                                    let label = context.dataset.label || '';
                                    if (label) label += ': ';
                                    if (context.dataset.type === 'bar') {
                                        const val = context.parsed.y;
                                        if (context.dataIndex === 0) {
                                            label = `起始人數: ${stock.shareholders[0].toLocaleString()}人`;
                                        } else {
                                            label += (val >= 0 ? '+' : '') + val.toFixed(2) + '%';
                                            const actual = stock.shareholders[context.dataIndex];
                                            label += ` (${actual.toLocaleString()}人)`;
                                        }
                                    } else {
                                        label += context.parsed.y.toFixed(2) + '%';
                                    }
                                    return label;
                                }
                            }
                        },
                        datalabels: {
                            display: true
                        }
                    },
                    scales: {
                        x: { 
                            ticks: { color: '#8b949e' }, 
                            grid: { display: false } 
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            min: bhMin - bhPadding,
                            max: bhMax + bhPadding,
                            title: { display: true, text: '大戶持股 %', color: mainColor },
                            ticks: { 
                                color: mainColor,
                                callback: (v) => v.toFixed(1) + '%'
                            },
                            grid: { color: 'rgba(48, 54, 61, 0.5)' }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            min: chgMin - chgPadding,
                            max: chgMax + chgPadding,
                            title: { display: true, text: '週變幅 %', color: '#8b949e' },
                            ticks: { 
                                color: '#8b949e',
                                callback: (v) => (v > 0 ? '+' : '') + v.toFixed(1) + '%'
                            },
                            grid: { display: false }
                        }
                    }
                }
            });
        }

        const grid = document.getElementById('chartGrid');
        rawData.forEach((stock, index) => {
            const canvasId = `chart-${index}`;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="stock-info">
                        <div class="stock-title">${stock.id}</div>
                        <div class="rating-badge">${stock.rating}</div>
                        <div class="insight-badge">💡 趨勢：${stock.note}</div>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="${canvasId}"></canvas>
                </div>
                <div class="footer-note">
                    <span class="tag">更新日期：03/13</span>
                </div>
            `;
            grid.appendChild(card);
            createChart(canvasId, stock);
        });
    </script>
</body>
</html>
